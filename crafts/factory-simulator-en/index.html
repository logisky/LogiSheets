<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Factory Simulator</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #f5f5f7;
      color: #111827;
    }
    h1 { margin: 0 0 16px; font-size: 20px; }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 12px 16px;
      box-shadow: 0 1px 3px rgba(15,23,42,0.08);
      border: 1px solid #e5e7eb;
      margin-bottom: 12px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      padding: 6px 14px;
      font-size: 13px;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      color: #111827;
      cursor: pointer;
    }
    .btn:hover { background: #e5e7eb; }
    .btn-primary {
      border-color: #2563eb;
      background: #2563eb;
      color: #fff;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .log {
      font-family: monospace;
      font-size: 12px;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 8px 10px;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .log-entry { margin: 2px 0; }
    .log-ok { color: #16a34a; }
    .log-err { color: #dc2626; }
    .log-info { color: #2563eb; }
    .section-title { font-weight: 600; font-size: 13px; color: #4b5563; margin-bottom: 8px; }
    /* ---------------- Status bar ----------------------------- */
    .status-bar {
      display: flex;
      align-items: stretch;
      flex-wrap: wrap;
      gap: 12px;
      padding: 8px 12px;
      background: linear-gradient(90deg, #111827 0%, #1f2937 100%);
      color: #f9fafb;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }
    .status-bar .pill {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
      padding: 4px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
    }
    .status-bar .pill .label {
      color: #9ca3af;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .status-bar .pill .value {
      font-weight: 700;
      font-size: 14px;
    }
    .status-bar .pill .value-row {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
    }
    .status-bar .pill .delta {
      font-size: 11px;
      padding: 1px 5px;
      border-radius: 6px;
    }
    .status-bar .delta-up { background: rgba(34,197,94,0.18); color: #4ade80; }
    .status-bar .delta-down { background: rgba(239,68,68,0.18); color: #f87171; }
    .status-bar .delta-zero { color: #9ca3af; }
    .status-bar .empty { color: #9ca3af; }
    /* ---------------- Round summary modal -------------------- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .modal {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 14px 40px rgba(15,23,42,0.25);
      width: min(420px, 92vw);
      max-height: 85vh;
      overflow: auto;
      padding: 18px 20px 16px;
    }
    .modal h2 {
      margin: 0 0 12px;
      font-size: 16px;
    }
    .modal .row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 4px 0;
      border-bottom: 1px dashed #e5e7eb;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }
    .modal .row:last-of-type { border-bottom: none; }
    .modal .row .num.pos { color: #16a34a; }
    .modal .row .num.neg { color: #dc2626; }
    .modal .row .num.zero { color: #6b7280; }
    .modal .section { margin-top: 10px; }
    .modal .section-h {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #6b7280;
      margin-bottom: 2px;
    }
    .modal .totals {
      margin-top: 14px;
      padding-top: 8px;
      border-top: 2px solid #111827;
    }
    .modal .totals .row { font-weight: 600; }
    .modal-close {
      margin-top: 14px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    /* ---------------- Onboarding ----------------------------- */
    .help-btn {
      margin-left: auto;
      width: 26px;
      height: 26px;
      border-radius: 13px;
      border: 1px solid #d1d5db;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      color: #4b5563;
      line-height: 1;
    }
    .help-btn:hover { background: #f3f4f6; color: #111827; }
    .onboarding { width: min(540px, 94vw); }
    .onboarding h2 { margin-bottom: 6px; }
    .onboarding .subtitle {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 14px;
    }
    .onboarding ol { padding-left: 20px; margin: 6px 0 12px; }
    .onboarding li { margin: 4px 0; font-size: 13px; line-height: 1.5; }
    .onboarding .block { margin-top: 12px; }
    .onboarding .block-h {
      font-size: 12px;
      font-weight: 700;
      color: #111827;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .onboarding p { margin: 4px 0; font-size: 13px; line-height: 1.55; }
    .onboarding .pill-tag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      background: #e5e7eb;
      color: #111827;
      font-size: 11px;
      font-family: monospace;
    }
    .onboarding label {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      font-size: 12px;
      color: #6b7280;
    }
    .nav-btn { position: relative; }
    .nav-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-left: 6px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 9px;
      background: #dc2626;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      cursor: help;
    }
    .nav-badge.hint {
      background: #16a34a;
    }
  </style>
</head>
<body>
  <div style="display:flex;align-items:center;margin-bottom:12px;">
    <h1 style="margin:0;">Factory Simulator</h1>
    <button type="button" class="help-btn" id="help-btn" title="Tutorial">?</button>
  </div>

  <div class="status-bar" id="status-bar">
    <span class="empty">No game in progress</span>
  </div>

  <div class="card">
    <div class="section-title">Game Setup</div>
    <button type="button" class="btn btn-primary" id="new-game-btn">New Game</button>
    <button type="button" class="btn" id="tick-btn" disabled>Deploy &amp; Advance Round</button>
  </div>

  <div class="card">
    <div class="section-title">Jump To</div>
    <button type="button" class="btn nav-btn" data-jump="OrderConfiguration" data-nav-key="Sales">Sales</button>
    <button type="button" class="btn nav-btn" data-jump="ProductionLine" data-nav-key="Plant">Plant</button>
    <button type="button" class="btn nav-btn" data-jump="OpticalGlassSupplier" data-nav-key="Procurement">Procurement</button>
    <button type="button" class="btn nav-btn" data-jump="FinancialStatus" data-nav-key="Finance">Finance</button>
  </div>

  <div class="card">
    <div class="section-title">Log</div>
    <div class="log" id="log"></div>
  </div>

  <script src="./factory-simulator.js"></script>
  <script>
    function log(msg, type = 'info') {
      const el = document.getElementById('log');
      const line = document.createElement('div');
      line.className = `log-entry log-${type}`;
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      el.appendChild(line);
      el.scrollTop = el.scrollHeight;
    }

    // Jump-to-block buttons (Sales / Plant / Procurement). The host
    // exposes window.blockManager (carries refName per field, stamped
    // from the bindFormSchema payloads at game setup) and
    // window.setSelection (handles sheet switch + selection — which the
    // engine then auto-scrolls to). Each button's data-jump attribute is
    // the refName of the topmost table in that department's block group.
    // ---- Status bar -----------------------------------------------
    // Last-known status snapshot so we can show the latest-round delta
    // alongside the new value (e.g. "Cash $1,200  +300"). Updated on
    // every newGame / advanceRound.
    let lastStatus = null;
    const fmtCash = (n) =>
      '$' + Math.round(n).toLocaleString('en-US');
    const fmtSignedCash = (n) => {
      const s = Math.round(n).toLocaleString('en-US');
      return (n > 0 ? '+$' : n < 0 ? '−$' : '$') + s.replace('-', '');
    };
    const fmtSignedNum = (n) => {
      if (n > 0) return '+' + Math.round(n);
      if (n < 0) return '−' + Math.round(-n);
      return '0';
    };
    function renderStatusBar(status) {
      const el = document.getElementById('status-bar');
      if (!status) {
        el.innerHTML = '<span class="empty">No game in progress</span>';
        return;
      }
      const fundDelta = lastStatus ? status.fund - lastStatus.fund : 0;
      const goodwillDelta = lastStatus
        ? status.goodwill - lastStatus.goodwill
        : 0;
      const deltaCls = (d) =>
        d > 0 ? 'delta-up' : d < 0 ? 'delta-down' : 'delta-zero';
      el.innerHTML = `
        <span class="pill">
          <span class="label">Round</span>
          <span class="value">${status.round} / ${status.maxRounds}</span>
        </span>
        <span class="pill">
          <span class="label">Cash</span>
          <span class="value-row">
            <span class="value">${fmtCash(status.fund)}</span>
            ${lastStatus
              ? `<span class="delta ${deltaCls(fundDelta)}">${fmtSignedCash(fundDelta)}</span>`
              : ''}
          </span>
        </span>
        <span class="pill">
          <span class="label">Goodwill</span>
          <span class="value-row">
            <span class="value">${Math.round(status.goodwill)} / 150</span>
            ${lastStatus
              ? `<span class="delta ${deltaCls(goodwillDelta)}">${fmtSignedNum(goodwillDelta)}</span>`
              : ''}
          </span>
        </span>
      `;
      // Once the campaign has ended, lock out further advances. The
      // user can still start a new game.
      if (status.gameState && status.gameState !== 'playing') {
        document.getElementById('tick-btn').disabled = true;
      }
    }
    async function refreshStatusBar(opts = {}) {
      const wb = window.workbook;
      const blockIds = window.__factoryBlockIds;
      if (!wb || !blockIds || !FactorySimulator.getGameStatus) return;
      try {
        const status = await FactorySimulator.getGameStatus(wb, blockIds);
        if (!status) return;
        renderStatusBar(status);
        if (opts.commitAsLast) lastStatus = status;
      } catch (e) {
        console.error('status bar refresh failed', e);
      }
    }

    // ---- Round summary modal --------------------------------------
    // Friendlier names for the FinancialImpact keys when shown in the
    // dialog. Falls back to the raw key if unmapped. Keys here MUST
    // match the enLocale.finance.* strings the engine writes into the
    // FinancialImpact table.
    const SUMMARY_GROUPS = {
      revenue: {label: 'Revenue', keys: ['Revenue']},
      cost: {
        label: 'Cost',
        keys: [
          'Line 1 Cost', 'Line 2 Cost',
          'Glass Cost', 'Mount Cost', 'Fittings Cost',
          'Line 1 Upgrade', 'Line 2 Upgrade',
        ],
      },
      penalty: {label: 'Penalty', keys: ['Penalty', 'Qual. Penalty']},
    };
    function showRoundSummary(summary) {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      const modal = document.createElement('div');
      modal.className = 'modal';
      const lines = [];
      lines.push(`<h2>Round ${summary.round - 1} Settlement</h2>`);
      for (const [, group] of Object.entries(SUMMARY_GROUPS)) {
        const entries = group.keys
          .map((k) => [k, summary.breakdownByKey[k] ?? 0])
          .filter(([, v]) => Math.abs(v) > 1e-9);
        if (entries.length === 0) continue;
        lines.push(`<div class="section"><div class="section-h">${group.label}</div>`);
        for (const [k, v] of entries) {
          const cls = v > 0 ? 'pos' : v < 0 ? 'neg' : 'zero';
          lines.push(
            `<div class="row"><span>${k}</span><span class="num ${cls}">${fmtSignedCash(v)}</span></div>`
          );
        }
        lines.push('</div>');
      }
      // Net + goodwill + before/after.
      const netCls = summary.netCashDelta > 0 ? 'pos' : summary.netCashDelta < 0 ? 'neg' : 'zero';
      const gwCls = summary.goodwillDelta > 0 ? 'pos' : summary.goodwillDelta < 0 ? 'neg' : 'zero';
      lines.push('<div class="totals">');
      lines.push(
        `<div class="row"><span>Net Cash Change</span><span class="num ${netCls}">${fmtSignedCash(summary.netCashDelta)}</span></div>`
      );
      lines.push(
        `<div class="row"><span>Cash ${fmtCash(summary.fundBefore)} →</span><span class="num">${fmtCash(summary.fundAfter)}</span></div>`
      );
      lines.push(
        `<div class="row"><span>Goodwill Δ</span><span class="num ${gwCls}">${fmtSignedNum(summary.goodwillDelta)}</span></div>`
      );
      lines.push(
        `<div class="row"><span>Goodwill ${Math.round(summary.goodwillBefore)} →</span><span class="num">${Math.round(summary.goodwillAfter)} / 150</span></div>`
      );
      lines.push('</div>');
      lines.push(
        '<div class="modal-close"><button type="button" class="btn btn-primary" id="modal-close-btn">Got it</button></div>'
      );
      modal.innerHTML = lines.join('');
      overlay.appendChild(modal);
      const dismiss = () => {
        overlay.remove();
        document.removeEventListener('keydown', onKey);
      };
      const onKey = (e) => { if (e.key === 'Escape') dismiss(); };
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) dismiss();
      });
      document.addEventListener('keydown', onKey);
      document.body.appendChild(overlay);
      modal.querySelector('#modal-close-btn').addEventListener('click', dismiss);
    }

    // ---- Endgame modal --------------------------------------------
    // Surfaced once on the tick that flips gameState off 'playing'.
    // Pulls the same tier vocabulary as engine.ts; if we add more
    // states there, list them here too.
    const ENDING_META = {
      won_ultimate:    {emoji: '🏆', title: 'Ultimate Achievement', flavor: 'Goodwill above 147 and over $270,000 in the bank — an industry legend, rich and revered alike.', tone: 'good'},
      won_gold:        {emoji: '🥇', title: 'Industry Titan',       flavor: 'Cash ≥ $150,000 and Goodwill ≥ 130. A textbook operation.', tone: 'good'},
      won_silver:      {emoji: '🥈', title: 'Solid Operator',       flavor: 'Cash ≥ $15,000 and Goodwill ≥ 100. Steady and disciplined.', tone: 'good'},
      won_bronze:      {emoji: '🥉', title: 'Steady Finish',        flavor: 'You made it to the final round — your factory is still running.', tone: 'good'},
      won_alive:       {emoji: '😅', title: 'Barely Standing',      flavor: 'Weathered the storm, but the books are scraping the floor.', tone: 'neutral'},
      lost_bankruptcy: {emoji: '💸', title: 'Cash Flow Collapse',   flavor: 'Two consecutive rounds in the red — the factory has gone bankrupt.', tone: 'bad'},
      lost_reputation: {emoji: '🪦', title: 'Reputation Ruined',    flavor: 'Two consecutive rounds at zero goodwill — every customer has walked away.', tone: 'bad'},
    };
    function showEndgameModal(summary, status) {
      const meta = ENDING_META[summary.gameState];
      if (!meta) return;
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      const modal = document.createElement('div');
      modal.className = 'modal';
      const toneColor =
        meta.tone === 'good' ? '#16a34a' :
        meta.tone === 'bad'  ? '#dc2626' : '#6b7280';
      modal.innerHTML = `
        <h2 style="display:flex;align-items:center;gap:8px;color:${toneColor};">
          <span style="font-size:24px;">${meta.emoji}</span>
          <span>${meta.title}</span>
        </h2>
        <p style="margin:6px 0 14px;font-size:13px;color:#374151;">${meta.flavor}</p>
        <div class="row"><span>Rounds Survived</span><span class="num">${summary.round} / ${status ? status.maxRounds : '?'}</span></div>
        <div class="row"><span>Final Cash</span><span class="num">${fmtCash(summary.fundAfter)}</span></div>
        <div class="row"><span>Final Goodwill</span><span class="num">${Math.round(summary.goodwillAfter)} / 150</span></div>
        <p style="margin-top:14px;font-size:12px;color:#6b7280;">
          Want another shot? Click <strong>New Game</strong>. Same seed, same campaign — tweak your strategy and see if you can climb a tier.
        </p>
        <div class="modal-close">
          <button type="button" class="btn btn-primary" id="ending-close-btn">View this run's workbook</button>
        </div>
      `;
      overlay.appendChild(modal);
      const dismiss = () => {
        overlay.remove();
        document.removeEventListener('keydown', onKey);
      };
      const onKey = (e) => { if (e.key === 'Escape') dismiss(); };
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) dismiss();
      });
      document.addEventListener('keydown', onKey);
      document.body.appendChild(overlay);
      modal.querySelector('#ending-close-btn').addEventListener('click', dismiss);
    }

    // ---- Onboarding -----------------------------------------------
    // First-launch intro modal. Auto-shows once per origin (gated by
    // localStorage); the "?" button in the header re-opens it any
    // time. The "Don't show again" checkbox is a separate gate from
    // the first-time auto-show — when checked, future *auto*-shows
    // are suppressed, but the user can always re-open via the "?".
    const ONBOARDING_KEY = 'factory-simulator-en.onboardingDismissed';
    function buildOnboardingModal() {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      const modal = document.createElement('div');
      modal.className = 'modal onboarding';
      modal.innerHTML = `
        <h2>Welcome to Factory Simulator</h2>
        <div class="subtitle">A factory-management sim that runs LogiSheets as a game engine.</div>

        <div class="block">
          <div class="block-h">What is this</div>
          <p>
            You run a small factory: accept orders, produce, deliver, get paid. Each round you decide
            <strong>which orders to take</strong>, <strong>how to allocate capacity across the two production lines</strong>,
            and <strong>which suppliers to source from</strong>, then click
            <span class="pill-tag">Deploy &amp; Advance Round</span> to settle this round's revenue and costs.
          </p>
        </div>

        <div class="block">
          <div class="block-h">Goal</div>
          <p>
            Stay alive — and grow your <strong>cash</strong> and <strong>goodwill</strong> (max 150).
            Goodwill drives the next round's order quality: higher goodwill means bigger orders at better prices.
            On-time delivery is +1 goodwill; late delivery costs you per-unit penalty × undelivered amount,
            and goodwill drops by <span class="pill-tag">penalty / 100</span>.
          </p>
        </div>

        <div class="block">
          <div class="block-h">What a round looks like</div>
          <ol>
            <li>
              <strong>Sales</strong>: browse new orders in <em>NewOrderStatus</em> and tick
              <span class="pill-tag">Accept?</span>. Accepted orders auto-copy to <em>OrderStatus</em>
              and <em>OrderConfiguration</em>.
            </li>
            <li>
              <strong>Plant</strong>: in <em>ProductionLineContribution</em> set each line's
              <span class="pill-tag">Capacity This Round</span> (integer, ≤ max production), and use the percentage buttons
              to set the <strong>supplier split</strong> for each of the three materials (defaults to 50/50).
            </li>
            <li>
              <strong>Sales · allocation</strong>: in <em>OrderConfiguration</em>, split each accepted order's delivery between
              <span class="pill-tag">Line 1</span> and <span class="pill-tag">Line 2</span>.
              Total delivery on each line must not exceed that line's capacity this round.
            </li>
            <li>
              <strong>Procurement (optional)</strong>: once accumulated supply hits a threshold, click
              <span class="pill-tag">Joint R&amp;D</span> to permanently improve that supplier's yield or unit price.
            </li>
            <li>
              <strong>Finance</strong>: check the <em>FinancialImpact</em> preview for this round (costs negative, revenue positive).
              Looks good → click
              <span class="pill-tag">Deploy &amp; Advance Round</span>. A settlement panel will pop up showing this round's cash flow.
            </li>
          </ol>
        </div>

        <div class="block">
          <div class="block-h">Tips</div>
          <p>
            If a red <strong>!</strong> badge appears on a nav button, that section has a failed validation
            (e.g. one of the production lines is over-allocated). <strong>Click the button</strong> — it jumps you to the first offending cell.
          </p>
          <p>
            The top status bar always shows your current
            <span class="pill-tag">Round</span> /
            <span class="pill-tag">Cash</span> /
            <span class="pill-tag">Goodwill</span>, with +/− deltas after each settlement.
          </p>
        </div>

        <label>
          <input type="checkbox" id="onboarding-dismiss" />
          Don't show this automatically next time (click ? to view again)
        </label>
        <div class="modal-close">
          <button type="button" class="btn btn-primary" id="onboarding-close-btn">Start Game</button>
        </div>
      `;
      overlay.appendChild(modal);
      const dismiss = () => {
        try {
          if (modal.querySelector('#onboarding-dismiss').checked) {
            localStorage.setItem(ONBOARDING_KEY, '1');
          } else {
            localStorage.removeItem(ONBOARDING_KEY);
          }
        } catch (e) { /* localStorage unavailable — silent */ }
        overlay.remove();
        document.removeEventListener('keydown', onKey);
      };
      const onKey = (e) => { if (e.key === 'Escape') dismiss(); };
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) dismiss();
      });
      document.addEventListener('keydown', onKey);
      document.body.appendChild(overlay);
      modal.querySelector('#onboarding-close-btn').addEventListener('click', dismiss);
    }

    function maybeShowOnboardingOnLoad() {
      try {
        if (localStorage.getItem(ONBOARDING_KEY)) return;
      } catch (e) { /* localStorage unavailable — fall through and show */ }
      buildOnboardingModal();
    }

    document.getElementById('help-btn').addEventListener('click', () => {
      buildOnboardingModal();
      // Pre-check the dismiss box if it was already dismissed before —
      // re-opens shouldn't make the user re-tick it just to keep
      // future auto-shows off.
      try {
        if (localStorage.getItem(ONBOARDING_KEY)) {
          const box = document.querySelector('#onboarding-dismiss');
          if (box) box.checked = true;
        }
      } catch (e) { /* noop */ }
    });

    // Fire on initial paint. Defer one tick so the iframe is fully
    // settled and the host hasn't injected anything mid-render.
    setTimeout(maybeShowOnboardingOnLoad, 0);

    // Latest validation state per navKey, updated by the craft monitor.
    // Shape: { 'Sales': { failingCount: number, cells: [{sheetIdx,row,col,fieldName,...}] } }
    let validationState = {};

    function renderNavBadges() {
      document.querySelectorAll('button[data-jump]').forEach((btn) => {
        const navKey = btn.getAttribute('data-nav-key');
        const entry = validationState[navKey];
        btn.querySelectorAll('.nav-badge').forEach((b) => b.remove());
        if (!entry) return;
        // Red failing-validation badge wins visual priority over the
        // green hint — fix-the-broken-thing before look-at-the-shiny.
        if (entry.failingCount > 0) {
          const badge = document.createElement('span');
          badge.className = 'nav-badge';
          badge.textContent = '!';
          const lines = entry.cells.map((c) =>
            '· ' + c.refName + ' · row ' + (c.rowInBlock + 1) + ' · ' + c.fieldName
          );
          badge.title =
            navKey + ' has ' + entry.failingCount + ' failing validation(s):\n' + lines.join('\n');
          btn.appendChild(badge);
        }
        if (entry.availableCount && entry.availableCount > 0) {
          const hint = document.createElement('span');
          hint.className = 'nav-badge hint';
          hint.textContent = String(entry.availableCount);
          const lines = (entry.availableCells || []).map((c) =>
            '· ' + c.refName + ' · row ' + (c.rowInBlock + 1) + ' · ' + c.fieldName
          );
          hint.title =
            navKey + ' has ' + entry.availableCount + ' joint R&D opportunity(ies):\n' + lines.join('\n');
          btn.appendChild(hint);
        }
      });
    }

    document.querySelectorAll('button[data-jump]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const refName = btn.getAttribute('data-jump');
        const navKey = btn.getAttribute('data-nav-key');
        const bm = window.blockManager;
        const wb = window.workbook;
        if (!bm || !wb || !window.setSelection) {
          log('host APIs unavailable', 'err');
          return;
        }
        // If this nav group has a failing validation, jump straight to
        // the first offending cell instead of the block header. Saves
        // the user a hunt-and-peck.
        const entry = validationState[navKey];
        if (entry && entry.failingCount > 0) {
          const first = entry.cells[0];
          window.setSelection(first.sheetIdx, first.row, first.col);
          log(
            'Jumping to first failed validation in ' + navKey + ': '
              + first.refName + ' · row ' + (first.rowInBlock + 1) + ' · ' + first.fieldName,
            'info'
          );
          return;
        }
        if (entry && entry.availableCount && entry.availableCount > 0) {
          const first = entry.availableCells[0];
          window.setSelection(first.sheetIdx, first.row, first.col);
          log(
            'Jumping to first joint R&D opportunity in ' + navKey + ': '
              + first.refName + ' · row ' + (first.rowInBlock + 1) + ' · ' + first.fieldName,
            'info'
          );
          return;
        }
        const field = bm.fieldManager.getAll().find((f) => f.refName === refName);
        if (!field) { log('refName ' + refName + ' not bound yet — start a new game first', 'err'); return; }
        const info = await wb.getBlockInfo({sheetId: field.sheetId, blockId: field.blockId});
        if (!info || info.ty !== undefined) { log('getBlockInfo failed for ' + refName, 'err'); return; }
        // Simulator centralises every refNamed block on MAIN_SHEET.
        const targetIdx = FactorySimulator.SHEET_IDX[FactorySimulator.MAIN_SHEET];
        window.setSelection(targetIdx, info.rowStart, info.colStart);
      });
    });

    async function refreshValidationMonitor() {
      const wb = window.workbook;
      const blockIds = window.__factoryBlockIds;
      if (!wb || !blockIds || !FactorySimulator.refreshValidationSubscriptions) return;
      try {
        await FactorySimulator.refreshValidationSubscriptions(
          wb,
          blockIds,
          (state) => {
            validationState = state || {};
            renderNavBadges();
          }
        );
      } catch (e) {
        log('validation monitor refresh failed: ' + e.message, 'err');
        console.error(e);
      }
    }

    document.getElementById('tick-btn').addEventListener('click', async () => {
      try {
        const wb = window.workbook;
        if (!wb) { log('workbook not available', 'err'); return; }
        const blockIds = window.__factoryBlockIds;
        if (!blockIds) { log('start a new game first', 'err'); return; }
        const summary = await FactorySimulator.advanceRound(
          wb, blockIds,
          (order, accepted) => log('Order ' + order.orderId + ' → ' + accepted, 'info')
        );
        if (summary.gameStateChanged) {
          log('Game over after round ' + summary.round + ' settlement: ' + summary.gameState, 'info');
        } else {
          log('Advanced to round ' + summary.round + ', generated ' + summary.orders.length + ' orders ✓', 'ok');
        }
        // Refresh status + open the round summary dialog before the
        // validation monitor pass — players see "what just happened"
        // immediately while the new validation badges populate behind.
        await refreshStatusBar({commitAsLast: true});
        showRoundSummary(summary);
        // If this tick ended the campaign, stack an ending modal on
        // top of the round summary. Player closes both to reach the
        // workbook (now frozen at the final round).
        if (summary.gameStateChanged) {
          const wb2 = window.workbook;
          const blockIds2 = window.__factoryBlockIds;
          const finalStatus = wb2 && blockIds2
            ? await FactorySimulator.getGameStatus(wb2, blockIds2)
            : null;
          showEndgameModal(summary, finalStatus);
        }
        // New rows may have appeared (accepted orders, etc.); pick up
        // their validation shadows.
        await refreshValidationMonitor();
      } catch (e) {
        log('Error: ' + e.message, 'err');
        console.error(e);
      }
    });

    document.getElementById('new-game-btn').addEventListener('click', async () => {
      try {
        const wb = window.workbook;
        if (!wb) { log('workbook not available — open this craft inside LogiSheets', 'err'); return; }

        log('Starting new game…');
        console.log('starting')
        const blockIds = await FactorySimulator.newGame(wb, window.blockManager);
        window.__factoryBlockIds = blockIds;
        document.getElementById('tick-btn').disabled = false;
        log('Sheets and blocks created ✓', 'ok');
        log('Assigned block IDs:');
        Object.entries(blockIds).forEach(([k, v]) => log(`  · ${k} → id ${v}`));
        log('SHEET_IDX: ' + JSON.stringify(FactorySimulator.SHEET_IDX));

        // Flip host UI into the right mode for the game loop:
        //   - temp mode so player edits stack as one undoable round
        //   - block overlays pinned so titles/field headers stay visible
        if (window.uiSettings) {
          window.uiSettings.setTempMode(true);
          window.uiSettings.setAlwaysShowBlockInfo(true);
          log('UI: temp mode + always-show block overlays enabled', 'ok');
        }
        // Reset status bar to the freshly-seeded values (resets the
        // delta baseline too so the first round's delta reads cleanly).
        lastStatus = null;
        await refreshStatusBar({commitAsLast: true});
        // Subscribe validation shadows so the nav buttons can flag
        // failing cells. The handler updates `validationState` and
        // re-renders the badges on every flip.
        await refreshValidationMonitor();
        // Drop the player into Finance to read the round-zero baseline
        // (cash / goodwill / next round financial impact) before they
        // navigate to Sales and start accepting orders. Mirrors the
        // nav-button logic: look up the FinancialStatus block via
        // blockManager, then select its top-left cell.
        try {
          const bm = window.blockManager;
          const field = bm?.fieldManager.getAll().find((f) => f.refName === 'FinancialStatus');
          if (field && window.setSelection) {
            const info = await wb.getBlockInfo({sheetId: field.sheetId, blockId: field.blockId});
            if (info && info.ty === undefined) {
              const targetIdx = FactorySimulator.SHEET_IDX[FactorySimulator.MAIN_SHEET];
              window.setSelection(targetIdx, info.rowStart, info.colStart);
              // The engine's auto-scroll-to-selection sometimes leaves
              // anchorX at a non-zero value even though colStart is 0.
              // Reset the horizontal anchor explicitly; vertical stays
              // wherever the jump landed.
              if (window.setAnchor) window.setAnchor(0);
            }
          }
        } catch (e) {
          // Non-fatal: jump is a UX nicety, not a correctness step.
          console.warn('post-newGame jump to Finance failed:', e);
        }
      } catch (e) {
        log('Error: ' + e.message, 'err');
        console.error(e);
      }
    });
  </script>
</body>
</html>
